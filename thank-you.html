<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — John Kilpatrick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0b1f3a;
      --teal: #1d7a6b;
      --teal-light: #e6f4f1;
      --warm-white: #fdfcfa;
      --text-mid: #3d5068;
      --border: rgba(11,31,58,0.1);
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--warm-white);
      color: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .box {
      text-align: center;
      max-width: 480px;
    }

    .icon {
      width: 56px;
      height: 56px;
      background: var(--teal-light);
      border: 1px solid rgba(29,122,107,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    .icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--teal);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: var(--serif);
      font-size: 40px;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 16px;
      color: var(--navy);
    }

    p {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 40px;
    }

    a {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      color: var(--warm-white);
      background: var(--teal);
      padding: 13px 28px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    a:hover { opacity: 0.85; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .box { animation: fadeUp 0.5s ease both; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h1>Message received.</h1>
    <p>Thank you for getting in touch. I'll review your enquiry and get back to you shortly.</p>
    <a href="/">Return to homepage</a>
  </div>
</body>
</html>
